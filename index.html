<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>So Sánh Sổ Tiết Kiệm</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: linear-gradient(135deg,#f0f4ff,#fdf4ff); min-height: 100vh; }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const addMonths = (dateStr, months) => {
      const d = new Date(dateStr);
      d.setMonth(d.getMonth() + months);
      return d.toISOString().slice(0, 10);
    };
    const daysBetween = (a, b) => Math.round((new Date(b) - new Date(a)) / 86400000);
    const fmtVND = (n) => Math.round(n).toLocaleString("vi-VN") + " đ";
    const fmtPct = (n) => (n * 100).toFixed(4) + "%/năm";
    const parseVND = (s) => parseFloat(String(s).replace(/\./g, "").replace(",", "."));
    const formatVNDInput = (s) => {
      const raw = String(s).replace(/\D/g, "");
      return raw ? parseInt(raw, 10).toLocaleString("vi-VN") : "";
    };

    const makeBook = (n = 1) => ({
      id: Date.now() + n,
      name: `Sổ ${n}`,
      principalRaw: "100.000.000",
      startDate: "2024-10-01",
      termMonths: "6",
      oldRate: "5.5",
      compareDate: new Date().toISOString().slice(0, 10),
      newRate: "6.2",
    });

    const calc = (b) => {
      const P = parseVND(b.principalRaw);
      const months = parseInt(b.termMonths);
      const rOld = parseFloat(b.oldRate) / 100;
      const rNew = parseFloat(b.newRate) / 100;

      if (!b.startDate || !b.compareDate || isNaN(P) || P <= 0 || isNaN(months) || months <= 0
        || isNaN(rOld) || rOld < 0 || isNaN(rNew) || rNew < 0)
        return { error: "Vui lòng nhập đầy đủ và hợp lệ." };

      const maturityDate = addMonths(b.startDate, months);
      const dPast = daysBetween(b.startDate, b.compareDate);
      const dRemain = daysBetween(b.compareDate, maturityDate);
      const dTotal = daysBetween(b.startDate, maturityDate);

      if (dPast < 0) return { error: "Ngày so sánh phải sau ngày gửi." };
      if (dRemain <= 0) return { error: "Ngày so sánh phải trước ngày đáo hạn." };

      const interestRef = P * rOld * dPast / 365;
      const keepTotal = P * (1 + rOld * dTotal / 365);
      const cashReceived = P;
      const redeposit = cashReceived * (1 + rNew * dRemain / 365);
      const diff = redeposit - keepTotal;
      const breakEven = ((keepTotal / cashReceived) - 1) * 365 / dRemain;

      return { maturityDate, dPast, dRemain, dTotal, interestRef, keepTotal, cashReceived, redeposit, diff, breakEven, P, rOld, rNew };
    };

    const MiniBar = ({ keep, redeposit }) => {
      const max = Math.max(keep, redeposit);
      return (
        <div style={{ marginTop: 14 }}>
          <div style={{ fontSize: 11, color: "#94a3b8", fontWeight: 700, marginBottom: 6, textTransform: "uppercase", letterSpacing: 1 }}>So sánh trực quan</div>
          {[["🔒 Giữ sổ cũ", keep, "#3b82f6"], ["🔄 Gửi lại", redeposit, "#16a34a"]].map(([l, v, c]) => (
            <div key={l} style={{ marginBottom: 8 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 3 }}>
                <span style={{ color: "#64748b" }}>{l}</span>
                <span style={{ fontWeight: 700, color: c }}>{fmtVND(v)}</span>
              </div>
              <div style={{ background: "#f1f5f9", borderRadius: 99, height: 8 }}>
                <div style={{ background: c, width: (v / max * 100).toFixed(1) + "%", height: 8, borderRadius: 99 }} />
              </div>
            </div>
          ))}
        </div>
      );
    };

    const Row = ({ label, value, highlight, info }) => (
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", padding: "8px 0", borderBottom: "1px solid #f1f5f9" }}>
        <div style={{ flex: 1, fontSize: 12, color: "#64748b", display: "flex", alignItems: "center", gap: 4 }}>
          {label}
          {info && <span title={info} style={{ cursor: "help", color: "#94a3b8", fontSize: 13 }}>ⓘ</span>}
        </div>
        <div style={{ fontWeight: 700, fontSize: 14, color: highlight || "#1e293b", textAlign: "right", marginLeft: 12 }}>{value}</div>
      </div>
    );

    const inpStyle = { border: "1px solid #e2e8f0", borderRadius: 8, padding: "8px 10px", fontSize: 13, outline: "none", background: "#f8fafc", width: "100%" };
    const lbl = (t) => <label style={{ fontSize: 11, color: "#64748b", fontWeight: 700, display: "block", marginBottom: 3 }}>{t}</label>;

    const BookCard = ({ book, onChange, onDelete }) => {
      const r = calc(book);
      const set = (k, v) => onChange({ ...book, [k]: v });

      const diffColor = !r.error ? (r.diff > 10000 ? "#16a34a" : r.diff < -10000 ? "#dc2626" : "#ca8a04") : "#888";
      const verdictBg = !r.error ? (r.diff > 10000 ? "#dcfce7" : r.diff < -10000 ? "#fee2e2" : "#fef9c3") : "#f1f5f9";
      const verdictText = !r.error ? (r.diff > 10000 ? "✅ Nên gửi lại" : r.diff < -10000 ? "🔒 Nên giữ sổ cũ" : "⚖️ Gần hòa vốn") : "";

      return (
        <div style={{ background: "#fff", borderRadius: 18, boxShadow: "0 4px 20px rgba(0,0,0,0.08)", marginBottom: 24, overflow: "hidden" }}>
          <div style={{ background: "linear-gradient(90deg,#6366f1,#8b5cf6)", padding: "14px 20px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <input value={book.name} onChange={e => set("name", e.target.value)}
              style={{ background: "transparent", border: "none", outline: "none", color: "#fff", fontSize: 17, fontWeight: 800, width: "70%" }} />
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              {verdictText && <span style={{ background: verdictBg, color: diffColor, borderRadius: 99, padding: "4px 12px", fontSize: 12, fontWeight: 800 }}>{verdictText}</span>}
              <button onClick={onDelete} style={{ background: "rgba(255,255,255,0.2)", color: "#fff", border: "none", borderRadius: 8, padding: "6px 12px", cursor: "pointer", fontSize: 13, fontWeight: 700 }}>✕ Xóa</button>
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 0 }}>
            {/* form */}
            <div style={{ padding: 20, borderRight: "1px solid #f1f5f9" }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <div style={{ gridColumn: "1/-1" }}>
                  {lbl("Số tiền gốc (VND)")}
                  <input value={book.principalRaw}
                    onChange={e => set("principalRaw", e.target.value.replace(/[^0-9.]/g, ""))}
                    onBlur={e => set("principalRaw", formatVNDInput(parseVND(e.target.value)))}
                    placeholder="100.000.000" style={inpStyle} />
                </div>
                <div>{lbl("Ngày gửi ban đầu")}<input type="date" value={book.startDate} onChange={e => set("startDate", e.target.value)} style={inpStyle} /></div>
                <div>{lbl("Kỳ hạn (tháng)")}<input type="number" value={book.termMonths} onChange={e => set("termMonths", e.target.value)} style={inpStyle} /></div>
                <div>{lbl("Lãi suất sổ cũ (%/năm)")}<input type="number" step="0.01" value={book.oldRate} onChange={e => set("oldRate", e.target.value)} style={inpStyle} /></div>
                <div>{lbl("Ngày so sánh / tất toán")}<input type="date" value={book.compareDate} onChange={e => set("compareDate", e.target.value)} style={inpStyle} /></div>
                <div style={{ gridColumn: "1/-1" }}>{lbl("Lãi suất mới nếu gửi lại (%/năm)")}<input type="number" step="0.01" value={book.newRate} onChange={e => set("newRate", e.target.value)} style={inpStyle} /></div>
              </div>
            </div>

            {/* kết quả */}
            <div style={{ padding: 20 }}>
              {r.error ? (
                <div style={{ background: "#fff7ed", border: "1px solid #fed7aa", borderRadius: 10, padding: 14, color: "#c2410c", fontSize: 13 }}>⚠️ {r.error}</div>
              ) : (<>
                <div style={{ marginBottom: 10 }}>
                  <Row label="Ngày đáo hạn cũ" value={r.maturityDate} />
                  <Row label="Số ngày đã gửi" value={r.dPast + " ngày"} />
                  <Row label="Số ngày còn lại" value={r.dRemain + " ngày"} />
                </div>

                <div style={{ background: "#f8fafc", borderRadius: 10, padding: 12, marginBottom: 10 }}>
                  <div style={{ fontSize: 11, fontWeight: 800, color: "#6366f1", marginBottom: 6, textTransform: "uppercase" }}>① Lãi tạm tính (tham khảo)</div>
                  <Row label={`Theo lãi ${book.oldRate}%/năm đến nay`} value={"+" + fmtVND(r.interestRef)} highlight="#6366f1" info="Không phải tiền thực nhận khi tất toán." />
                  <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 6, fontStyle: "italic" }}>⚠ Chỉ tham khảo — tất toán trước hạn sẽ không được khoản này.</div>
                </div>

                <div style={{ background: "#eff6ff", borderRadius: 10, padding: 12, marginBottom: 10 }}>
                  <div style={{ fontSize: 11, fontWeight: 800, color: "#2563eb", marginBottom: 6, textTransform: "uppercase" }}>② Giữ sổ đến đáo hạn</div>
                  <Row label={`Gốc × (1 + ${book.oldRate}% × ${r.dTotal} ngày / 365)`} value={fmtVND(r.keepTotal)} highlight="#1d4ed8" info="Tổng tiền nhận nếu giữ nguyên đến ngày đáo hạn." />
                </div>

                <div style={{ background: "#fdf4ff", borderRadius: 10, padding: 12, marginBottom: 10 }}>
                  <div style={{ fontSize: 11, fontWeight: 800, color: "#9333ea", marginBottom: 6, textTransform: "uppercase" }}>③ Tất toán — tiền mặt thực nhận</div>
                  <Row label="Nhận lại đúng số tiền gốc" value={fmtVND(r.cashReceived)} highlight="#7c3aed" />
                  <div style={{ fontSize: 12, color: "#7c3aed", background: "#f3e8ff", borderRadius: 8, padding: "8px 10px", marginTop: 8, lineHeight: 1.6 }}>
                    Bỏ qua phần lãi không kỳ hạn — số tiền mặt cầm đi gửi lại là đúng bằng <b>số tiền gốc ban đầu</b>.
                  </div>
                </div>

                <div style={{ background: "#f0fdf4", borderRadius: 10, padding: 12, marginBottom: 10 }}>
                  <div style={{ fontSize: 11, fontWeight: 800, color: "#16a34a", marginBottom: 6, textTransform: "uppercase" }}>④ Gửi lại với lãi suất mới</div>
                  <Row label={`Gốc × (1 + ${book.newRate}% × ${r.dRemain} ngày / 365)`} value={fmtVND(r.redeposit)} highlight="#15803d" info="Lấy đúng số gốc ③ gửi lại đến đúng ngày đáo hạn cũ." />
                </div>

                <div style={{ borderRadius: 12, padding: 14, background: verdictBg, border: `1.5px solid ${diffColor}` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                    <span style={{ fontWeight: 800, color: diffColor, fontSize: 15 }}>{verdictText}</span>
                    <span style={{ fontSize: 18, fontWeight: 900, color: diffColor }}>{r.diff >= 0 ? "+" : ""}{fmtVND(r.diff)}</span>
                  </div>
                  <div style={{ fontSize: 12, color: "#64748b" }}>Lãi suất hòa vốn tối thiểu: <b style={{ color: "#7c3aed" }}>{fmtPct(r.breakEven)}</b></div>
                </div>

                <MiniBar keep={r.keepTotal} redeposit={r.redeposit} />
              </>)}
            </div>
          </div>
        </div>
      );
    };

    function App() {
      const [books, setBooks] = useState([makeBook(1)]);
      const update = (id, upd) => setBooks(bs => bs.map(b => b.id === id ? upd : b));
      const remove = (id) => setBooks(bs => bs.filter(b => b.id !== id));
      const add = () => setBooks(bs => [...bs, makeBook(bs.length + 1)]);
      const reset = () => setBooks([makeBook(1)]);

      const results = books.map(b => calc(b));
      const valid = results.filter(r => !r.error);
      const totalDiff = valid.reduce((s, r) => s + r.diff, 0);
      const nKeep = valid.filter(r => r.diff < -10000).length;
      const nRe = valid.filter(r => r.diff > 10000).length;

      const exportCSV = () => {
        const rows = [["Tên sổ","Số tiền gốc","Giữ đến đáo hạn","Tiền tất toán (gốc)","Gửi lại","Chênh lệch","Lãi hòa vốn"]];
        books.forEach((b, i) => {
          const r = results[i];
          if (!r.error) rows.push([b.name, parseVND(b.principalRaw), Math.round(r.keepTotal), Math.round(r.cashReceived), Math.round(r.redeposit), Math.round(r.diff), (r.breakEven*100).toFixed(4)+"%"]);
        });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob(["\uFEFF"+rows.map(r=>r.join(",")).join("\n")],{type:"text/csv;charset=utf-8"}));
        a.download = "so_tiet_kiem.csv"; a.click();
      };

      const btn = (label, onClick, bg, color="#fff") => (
        <button onClick={onClick} style={{ background: bg, color, border: "none", borderRadius: 10, padding: "12px 24px", fontSize: 14, fontWeight: 800, cursor: "pointer" }}>{label}</button>
      );

      return (
        <div style={{ padding: "24px 16px" }}>
          <div style={{ maxWidth: 960, margin: "0 auto" }}>
            <div style={{ textAlign: "center", marginBottom: 28 }}>
              <div style={{ fontSize: 30, fontWeight: 900, color: "#1e293b" }}>💰 So Sánh Sổ Tiết Kiệm</div>
              <div style={{ color: "#64748b", fontSize: 14, marginTop: 4 }}>Giữ sổ cũ hay tất toán & gửi lại? Tính chính xác ngay.</div>
            </div>

            {valid.length > 0 && (
              <div style={{ background: "#fff", borderRadius: 16, boxShadow: "0 2px 12px rgba(0,0,0,0.07)", padding: 20, marginBottom: 28, display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 12, textAlign: "center" }}>
                {[["📁 Tổng sổ", books.length, "#6366f1"],["🔒 Nên giữ", nKeep, "#2563eb"],["🔄 Nên gửi lại", nRe, "#16a34a"],["📊 Tổng chênh lệch", (totalDiff>=0?"+":"")+fmtVND(totalDiff), totalDiff>=0?"#16a34a":"#dc2626"]].map(([l,v,c])=>(
                  <div key={l}><div style={{ fontSize: 20, fontWeight: 900, color: c }}>{v}</div><div style={{ fontSize: 11, color: "#94a3b8", fontWeight: 700 }}>{l}</div></div>
                ))}
              </div>
            )}

            {books.map(b => <BookCard key={b.id} book={b} onChange={u => update(b.id, u)} onDelete={() => remove(b.id)} />)}

            <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap", marginTop: 8 }}>
              {btn("+ Thêm sổ", add, "#6366f1")}
              {btn("⬇ Xuất CSV", exportCSV, "#0ea5e9")}
              {btn("↩ Reset", reset, "#f1f5f9", "#64748b")}
            </div>

            <div style={{ textAlign: "center", marginTop: 20, fontSize: 11, color: "#cbd5e1" }}>
              Lãi đơn cuối kỳ · 365 ngày/năm · Tất toán = nhận lại đúng gốc · Không lưu dữ liệu
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
